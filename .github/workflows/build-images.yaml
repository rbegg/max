name: Build and Push Max Services

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: max-stt
            context: ./services/max-stt
            target: prod
            log_level: info
          - service: max-assistant
            context: ./services/max-assistant
            target: prod
          - service: max-tts
            context: ./services/max-tts
            target: prod
          - service: ollama
            context: ./services/ollama
            # no target needed
          - service: proxy
            context: ./proxy
            target: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          # Optional: Point to the specific Dockerfile if it's not in the context root
          file: ${{ matrix.context }}/Dockerfile